name: CI to AWS ECR

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: 871950640338.dkr.ecr.ap-northeast-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 複数アーキテクチャ(linux/arm64)ビルドのためのセットアップ
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 1. AWS への認証
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 2. ECR へのログイン
    - name: Log in to AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 3. 各コンテナのビルド ＆ ECRへのプッシュ (latest と sha の2つのタグを同時付与)
    - name: Build and Push deleuze-auth
      uses: docker/build-push-action@v5
      with:
        context: ./deleuze-auth
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/deleuze-auth:latest
          ${{ env.ECR_REGISTRY }}/deleuze-auth:${{ github.sha }}

    - name: Build and Push deleuze-app
      uses: docker/build-push-action@v5
      with:
        context: ./deleuze-app
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/deleuze-app:latest
          ${{ env.ECR_REGISTRY }}/deleuze-app:${{ github.sha }}

    - name: Build and Push deleuze-mng
      uses: docker/build-push-action@v5
      with:
        context: ./deleuze-mng
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/deleuze-mng:latest
          ${{ env.ECR_REGISTRY }}/deleuze-mng:${{ github.sha }}